networks:
  software-network:
    external: true
services:
  latest:
    image: nginx:latest
    ports:
      - "0:80" # 将主机的8080端口映射到容器的80端口
    # volumes:
    #   - ./_/conf/nginx.conf:/etc/nginx/nginx.conf:ro # 挂载自定义配置文件
    #   - ./_/conf.d:/etc/nginx/conf.d:ro
    #   - ./_/html:/usr/share/nginx/html:ro # 挂载静态HTML文件目录
    #   - ./_/logs:/var/log/nginx
    restart: unless-stopped
    networks:
      - software-network
  mainline:
    image: nginx:mainline
    ports:
      - 0:80
    restart: unless-stopped
    networks:
      - software-network
  alpine:
    image: nginx:alpine
    ports:
      - 0:80
    restart: unless-stopped
    networks:
      - software-network
  stable:
    image: nginx:stable
    ports:
      - 0:80
    restart: unless-stopped
    networks:
      - software-network
  trixie:
    image: nginx:trixie
    ports:
      - 0:80
    restart: unless-stopped
    networks:
      - software-network
  perl:
    image: nginx:perl
    ports:
      - 0:80
    restart: unless-stopped
    networks:
      - software-network
  otel:
    image: nginx:otel
    ports:
      - 0:80
    restart: unless-stopped
    networks:
      - software-network
