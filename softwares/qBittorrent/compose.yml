networks:
  software-network:
    external: true
services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    volumes:
      - qbittorrent-config:/config
      - qbittorrent-downloads:/downloads
    ports:
      - "8080"
      - "6881"
      - "6881/udp"
    restart: unless-stopped
    labels:
      yantr.app: "qbittorrent"
      yantr.service: "Torrent Client"
  # qbittorrent:
