  # latest:
  #   image: alpine/openclaw
  #   ports:
  #     - "0:3000" # 控制台端口。
  #     - "0:18789" # 服务通信端口。
  #   environment:
  #     - CLAUDE_API_KEY=your_api_key_here # 替换为阿里云百炼 API Key。
  #   volumes:
  #     - latest_data:/app/data
  #   networks:
  #     - software-network
  2026.3.8:
    image: ghcr.io/openclaw/openclaw:2026.3.8
    # container_name: openclaw
    ports:
      - "18789"
      - "18791"
    environment:
      - OPENCLAW_DB_HOST=postgres
      - OPENCLAW_DB_PORT=5432
      - OPENCLAW_DB_USER=openclaw
      - OPENCLAW_DB_PASSWORD=your_password
      - OPENCLAW_DB_NAME=openclaw
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    volumes:
      - openclaw_data:/data
      - openclaw_config:/config
      - openclaw_linuxbrew:/home/linuxbrew
    restart: unless-stopped
    networks:
      - software-network

  postgres:
    image: postgres:15-alpine
    container_name: openclaw-db
    environment:
      - POSTGRES_USER=openclaw
      - POSTGRES_PASSWORD=your_password
      - POSTGRES_DB=openclaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - software-network
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - software-network
volumes:
  postgres_data:
  redis_data:
  latest_data:
  openclaw_data:
  openclaw_config:
  openclaw_linuxbrew:
