networks:
  software-network:
    external: true

services:
  main:
    image: ghcr.io/open-webui/open-webui:main
    labels:
      software.app: "open-webui"
      software.service: "AI UI"
      software.homepage: https://github.com/open-webui/open-webui
      software.package-url: https://github.com/open-webui/open-webui/pkgs/container/open-webui
      software.repository-url: https://github.com/open-webui/open-webui
    ports:
      - "8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - main_data:/app/backend/data
    restart: unless-stopped
    networks:
      - software-network

volumes:
  main_data:
