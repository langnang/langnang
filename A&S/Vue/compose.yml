networks:
  software-network:
    external: true
services:
  v2-html-unpkg:
    image: ghcr.io/azurbluetw/v2-html-unpkg:latest
    environment:
      - TZ=Asia/Shanghai
    ports:
      - 0:80
    restart: unless-stopped
    networks:
      - software-network
  v3-html-unpkg:
    image: ghcr.io/azurbluetw/v3-html-unpkg:latest
    environment:
      - TZ=Asia/Shanghai
    ports:
      - 0:80
    restart: unless-stopped
    networks:
      - software-network
  alpine:
    image: node:alpine
    ports:
      - 0:5173
    working_dir: /app
    volumes:
      - ./latest-app:/app/
      - /app/node_modules
    command: sh -c "npm install && npm run dev" # 自动安装依赖并启动
    networks:
      - software-network
