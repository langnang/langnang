
[common]
# server_addr为FRPS服务器IP地址
server_addr = 101.126.135.139
# server_port为服务端监听端口，bind_port
server_port = 7000
# 身份验证
token = langnang.com
# includes = ["/etc/frp/confd/*.toml"]

webServer_addr = "127.0.0.1"#监听地址，默认为 127.0.0.1。
webServer_port = 7400 #【必填】监听端口。
webServer_user = "admin"#仪表盘用户名。
webServer_password = "admin1234"#仪表盘密码。

#? http://127.0.0.1:7400

