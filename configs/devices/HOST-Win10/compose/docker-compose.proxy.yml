services:
  adminer:
    image: adminer:latest
    ports:
      - 0:8080
    # volumes:
    #   - ./plugins:/var/www/html/plugins-enabled
    # environment:
    #   - ADMINER_DESIGN=hydra
    #   - ADMINER_PLUGINS=login-ldap
    restart: unless-stopped
    networks:
      - software-network

  emby:
    image: emby/embyserver:latest
    ports:
      - 0:8096
    environment:
      - LANG=zh_CN.UTF-8
    volumes:
      - ./emby/config:/config
      - D:\Videos:/media
    restart: unless-stopped
    networks:
      - software-network

  glances:
    image: nicolargo/glances:latest
    ports:
      - 0:61208
    environment:
      - TZ=Asia/Shanghai
      - GLANCES_OPT=-w
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - software-network

  gotty:
    image: modenaf360/gotty:latest
    ports:
      - 0:8080
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
    tty: true
    stdin_open: true
    restart: unless-stopped
    networks:
      - software-network

  homer:
    image: b4bz/homer:latest
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Asia/Shanghai
    volumes:
      - ./homer/subs:/www/assets/subs
      - ./homer/custom.css:/www/assets/custom.css
      - ./homer/config.yml:/www/assets/config.yml
      - ./homer/develop.yml:/www/assets/develop.yml
    ports:
      - 0:8080
    restart: unless-stopped
    networks:
      - software-network
  jenkins:
    image: jenkins/jenkins:latest
    ports:
      - 0:8080
    volumes:
      - ./jenkins/var/jenkins_home:/var/jenkins_home
    environment:
      - JENKINS_PREFIX=/jenkins
      - JAVA_OPTS=-Xmx256m
    command: --prefix=/jenkins
    restart: unless-stopped
    networks:
      - software-network
  portainer:
    image: 6053537/portainer-ce:latest
    ports:
      - 0:9000
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    restart: unless-stopped
    networks:
      - software-network
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    ports:
      - 0:8080 # Web UI 端口
      # - "0:6881" # TCP 连接端口
      # - "0:6881/udp" # UDP 连接端口
    environment:
      - PUID=1000 # 用户 ID
      - PGID=1000 # 用户组 ID
      - TZ=Asia/Shanghai # 时区设置
    volumes:
      - ./qbittorrent/config:/config
      - D:\Downloads:/downloads
    restart: unless-stopped
    networks:
      - software-network

  reader:
    image: hectorqin/reader
    ports:
      - 0:8080
    volumes:
      - ./reader/log:/log
      - ./reader/storage:/storage
    restart: unless-stopped
    networks:
      - software-network

  smartping:
    image: qctt/smartping
    ports:
      - 0:8899
    volumes:
      - ./smartping/conf:/smartping/conf
      - ./smartping/html:/smartping/html
      - ./smartping/assets:/smartping/assets
    restart: unless-stopped
    networks:
      - software-network

  vaultwarden:
    image: vaultwarden/server:latest
    environment:
      # DOMAIN: "https://vaultwarden.example.com" # 使用反向代理时必填；您的域名；Vaultwarden 需要知道它是 https 才能正确处理附件
      SIGNUPS_ALLOWED: "false" # 创建账户后，使用 "false" 停用此选项，这样就不会有陌生人注册了
    volumes:
      - ./vaultwarden/data:/data # : 前面的路径可以修改
    ports:
      - 0:80 # 您可以将 11001 替换为您喜欢的端口
    restart: unless-stopped
    networks:
      - software-network
  reference:
    image: wcjiang/reference
    ports:
      - "0:3000"
    # volumes:
    #   - ./reference/static:/home/static
    restart: unless-stopped
    networks:
      - software-network
networks:
  software-network:
    external: true
