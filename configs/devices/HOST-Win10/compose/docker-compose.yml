include:
  - ./frpc/docker-compose.yml
  - ./docker-compose.database.yml
  - ./docker-compose.develop.yml
  - ./docker-compose.host.yml
  - ./docker-compose.proxy.yml
  - D:\wwwroot\@Langnang\_docs\softwares\LibreTV\docker-compose.yml
  - ./nginx/docker-compose.yml
services:
  hello-world:
    image: hello-world
    container_name: hello-world
  surveyking:
    image: surveyking/surveyking
    volumes:
      - ./surveyking/app/files:/app/files # 文件目录，存储上传的文件，冒号左侧改成自己的，下同
      - ./surveyking/app/logs:/app/logs # 运行日志
      - ./surveyking/app/db:/app/db # 数据库文件
    ports:
      - 0:1991 # 冒号左侧可改
    restart: unless-stopped
    networks:
      - software-network
  synctv:
    image: synctvorg/synctv
    ports:
      - "0:8080"
    restart: unless-stopped
    networks:
      - software-network
  spider-flow:
    image: wbsu2003/spider-flow
    ports:
      - 0:8088
    environment:
      - SPRING_DATASOURCE_DRIVER-CLASS-NAME=com.mysql.jdbc.Driver
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=phpts
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal/spiderflow?useSSL=false&useUnicode=true&characterEncoding=UTF8&autoReconnect=true&allowPublicKeyRetrieval=true
    restart: unless-stopped
    networks:
      - software-network

  crawlab:
    image: crawlabteam/crawlab
    environment:
      CRAWLAB_NODE_MASTER: "Y"
      # CRAWLAB_MONGO_HOST: "127.0.0.1" # mongo host address. 在 Docker-Compose 网络中，直接引用 service 名称
      # CRAWLAB_MONGO_HOST: "host.docker.internal"
      CRAWLAB_MONGO_HOST: mongodb
      CRAWLAB_MONGO_PORT: 27017 # mongo port
      CRAWLAB_MONGO_DB: crawlab # mongo database
      CRAWLAB_MONGO_USERNAME: mongodb # mongo username
      CRAWLAB_MONGO_PASSWORD: langnang.com # mongo password
      CRAWLAB_MONGO_AUTHSOURCE: admin # mongo auth source
      # CRAWLAB_REDIS_ADDRESS: "172.24.0.1"
    ports:
      - "0:8080"
    volumes:
      - "./crawlab/master:/root/.crawlab" # 持久化 crawlab 元数据
      - "./crawlab/data:/data" # 持久化 crawlab 数据
      - "./crawlab/logs:/var/log/crawlab" # 持久化 crawlab 任务日志
      # - "./crawlab/working_dir:/app/backend"
    restart: unless-stopped
    networks:
      - software-network

  answer:
    image: answerdev/answer
    ports:
      - "0:80"
    volumes:
      - ./answer/data:/data
    restart: unless-stopped
    networks:
      - software-network

  grafana:
    image: grafana/grafana-enterprise
    ports:
      - "0:3000"
    volumes:
      - ./grafana:/var/lib/grafana
    restart: unless-stopped
    networks:
      - software-network

  node-exporter:
    image: prom/node-exporter:latest

    ports:
      - "0:9100"
    volumes:
      - ./node-exporter/host/proc:/host/proc
      - ./node-exporter/host/sys:/host/sys
      - ./node-exporter/rootfs:/rootfs
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped
    networks:
      - software-network
  redmine:
    image: redmine:latest
    ports:
      - "0:3000"
    volumes:
      - ./redmine/sqlite:/usr/src/redmine/sqlite
      - ./redmine/files:/usr/src/redmine/files
      - ./redmine/plugins:/usr/src/redmine/plugins # 插件目录
      - ./redmine/themes:/usr/src/redmine/public/themes # 主题目录
    restart: unless-stopped
    networks:
      - software-network
  jellyfin:
    image: jellyfin/jellyfin:latest
    ports:
      - 0:8096
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - D:\Videos:/media
    restart: unless-stopped
    networks:
      - software-network
networks:
  software-network:
    external: true
