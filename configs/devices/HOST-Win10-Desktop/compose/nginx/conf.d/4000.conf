server {
 	listen 4000;
 	listen [::]:4000;
 	server_name localhost;
 
 	location / {
        add_header Content-Type text/plain;  
        charset utf-8;
 	 	
        root /usr/share/nginx/markdown;
        index index.html index.htm;
        # try_files $uri $uri/ /README.md;
        # rewrite ^/old-path/(.*)$ /new-path/$1 permanent;
        # rewrite ^/$ /README.md permanent;
		# rewrite / /README.md;			

        # rewrite ^(.*)/$ $1/README.md break;
        # return 301 $request_uri/README.md break;
 	}
	
    # location ~ \.md {
    #     markdown_filter on;
    #     markdown_template html/template.html;
    # }
 
	error_page 500 502 503 504 /50x.html; 
	location = /50x.html { 
	 	root /usr/share/nginx/html; 
	} 
}
