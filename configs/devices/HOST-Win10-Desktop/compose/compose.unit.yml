services:
  nginx:
    image: nginx:alpine
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/mime.types:/etc/nginx/mime.types
      - ./nginx/upstream.d:/etc/nginx/upstream.d
      - ./nginx/conf.d:/etc/nginx/conf.d
    restart: unless-stopped
    networks:
      - software-network
  mind-map:
    image: shuiche/mind-map:latest
    ports:
      - 0:8080
    # volumes:
    #   - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    #   - ./nginx/mime.types:/etc/nginx/mime.types
    #   - ./nginx/upstream.d:/etc/nginx/upstream.d
    #   - ./nginx/conf.d:/etc/nginx/conf.d
    restart: unless-stopped
    networks:
      - software-network

networks:
  software-network:
    external: true
