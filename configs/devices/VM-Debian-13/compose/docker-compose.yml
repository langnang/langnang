include:
  - ./docker-compose.database.yml
  - ./docker-compose.host.yml
  - ./docker-compose.proxy.yml
services:
  nginx:
    image: nginx:alpine
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/mime.types:/etc/nginx/mime.types
      - ./nginx/conf.d:/etc/nginx/conf.d
    restart: unless-stopped
