name: 🚀 Deploy langnang-modules on push with FTP

on:
  push:
    branches:
      - master
    paths:
      - "composer/langnang/**"

jobs:
  deploy:
    name: 🎉 Deploy to langnang.byethost7.com
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v2

      # - name: Use Node.js 14.x
      #   uses: actions/setup-node@v2
      #   with:
      #     node-version: 14.x

      # - name: Install node dependencies
      #   run: cd nodejs/vue2-ui && yarn install

      # - name: Build pages
      #   run: cd nodejs/vue2-ui && npm run build

      # - name: Install composer dependencies
      # run: cd composer/laravel8-modules && composer install

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          # ftp server
          server: ftpupload.net
          # ftp username
          username: b7_34048879
          # ftp password
          password: ${{ secrets.ftp_password }}
          # local dir
          local-dir: ./composer/langnang/
          # Path to upload to on the server. Must end with trailing slash /
          server-dir: /htdocs/
          # File to Exclude
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*/**
            **/node_modules/**
